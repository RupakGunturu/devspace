<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevSpace — From First Line of Code to Production</title>
    <meta name="description" content="DevSpace is a free platform for students and developers — interactive coding games to learn the fundamentals, browser-based dev tools for real work, and bite-sized content to stay sharp. No signups, no paywalls." />
    <meta name="keywords" content="learn to code, developer tools, coding games, dev tools online, free developer tools, programming tips, web development resources, coding for beginners" />
    <meta name="author" content="DevSpace" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="canonical" href="https://devspace.app" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:title" content="DevSpace — From First Line of Code to Production" />
    <meta property="og:description" content="A free platform for students and developers — coding games to learn, dev tools for real work, and bite-sized content to stay sharp. No signups, no paywalls." />
    <meta property="og:image" content="https://devspace.app/favicon.png" />
    <meta property="og:url" content="https://devspace.app" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DevSpace" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DevSpace — From First Line of Code to Production" />
    <meta name="twitter:description" content="Coding games to learn, dev tools for real work, and bite-sized content to stay sharp — free for students and developers." />
    <meta name="twitter:image" content="https://devspace.app/favicon.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "DevSpace",
      "alternateName": "DevSpace — From First Line of Code to Production",
      "url": "https://devspace.app",
      "description": "A free platform for students and developers: interactive coding games to learn the fundamentals, browser-based dev tools for real work, and bite-sized content to stay sharp.",
      "keywords": "learn to code, developer tools, coding games, learn programming, dev tools online",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://devspace.app/tools?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "DevSpace",
      "url": "https://devspace.app",
      "logo": "https://devspace.app/favicon.png",
      "description": "DevSpace helps students learn to code through interactive games and gives developers free browser-based tools and content to keep building."
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Theme init -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
